<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HRD Drive - Login</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell shell-center">
      <section class="hero hero-single">
        <div>
          <p class="eyebrow">MinIO Storage Dashboard</p>
          <h1>HRD Drive</h1>
          <p class="lede">
            Masuk dulu untuk membuka halaman upload dan daftar file.
          </p>
        </div>
        <form id="loginForm" class="panel login-panel">
          <div class="panel-head">
            <h2>Login</h2>
            <p>Simpan kredensial dashboard di browser ini.</p>
          </div>

          <div id="message" class="alert" hidden></div>

          <label class="field">
            <span>Username</span>
            <input id="authUser" type="text" placeholder="admin" autocomplete="username" />
          </label>

          <label class="field">
            <span>Password</span>
            <input id="authPass" type="password" placeholder="••••••••" autocomplete="current-password" />
          </label>

          <button type="submit">Masuk ke Upload</button>
        </form>
      </section>
    </main>
    <script src="/login.js"></script>
  </body>
</html>
